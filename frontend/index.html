<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clasificador de Mangos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; }
    .card { border-radius: 12px; }
    .preview-img { max-width: 300px; max-height: 300px; border-radius: 8px; border: 2px solid #ddd; }
    .exportable-badge { font-size: 1.2rem; }
    .loader { display: none; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="text-center mb-4">
      <h1 class="display-5">🥭 Clasificador de Mangos</h1>
      <p class="text-muted">Subí una foto para identificar el tipo y si es exportable</p>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-6">
        <!-- Upload Card -->
        <div class="card shadow-sm mb-4">
          <div class="card-body text-center">
            <h5 class="card-title">📤 Cargar imagen</h5>
            <input type="file" id="imageUpload" accept=".jpg,.jpeg,.png,.bmp" class="form-control-file mb-3" onchange="previewImage()">
            <div id="imagePreview" class="mb-3"></div>
            <button class="btn btn-success btn-lg btn-block" onclick="clasificar()" id="btnClasificar">
              🔍 Clasificar
            </button>
            <div class="loader text-center mt-3" id="loader">
              <div class="spinner-border text-success" role="status"></div>
              <p class="text-muted mt-2">Analizando imagen... (puede tardar unos segundos)</p>
            </div>
          </div>
        </div>

        <!-- Result Card -->
        <div class="card shadow-sm" id="resultCard" style="display:none;">
          <div class="card-body text-center" id="resultBody"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
  function previewImage() {
    const input = document.getElementById('imageUpload');
    const preview = document.getElementById('imagePreview');
    if (!input.files.length) { preview.innerHTML = ''; return; }
    const reader = new FileReader();
    reader.onload = e => {
      preview.innerHTML = `<img src="${e.target.result}" class="preview-img" alt="Preview">`;
    };
    reader.readAsDataURL(input.files[0]);
    document.getElementById('resultCard').style.display = 'none';
  }

  function clasificar() {
    const input = document.getElementById('imageUpload');
    const resultCard = document.getElementById('resultCard');
    const resultBody = document.getElementById('resultBody');
    const loader = document.getElementById('loader');
    const btn = document.getElementById('btnClasificar');

    // Validar que haya imagen
    if (!input.files.length) {
      resultCard.style.display = 'block';
      resultBody.innerHTML = '<div class="alert alert-warning">⚠️ Seleccioná una imagen primero</div>';
      return;
    }

    // Mostrar loader
    loader.style.display = 'block';
    btn.disabled = true;
    resultCard.style.display = 'none';

    const formData = new FormData();
    formData.append('image', input.files[0]);

    fetch('/predict', { method: 'POST', body: formData })
      .then(res => {
        if (!res.ok) {
          return res.json().then(err => { throw new Error(err.error || `Error ${res.status}`); });
        }
        return res.json();
      })
      .then(data => {
        const exportableIcon = data.exportable ? '✅ Exportable' : '❌ No exportable';
        const exportableColor = data.exportable ? 'success' : 'danger';
        const probColor = data.probabilidad > 80 ? 'success' : data.probabilidad > 60 ? 'warning' : 'danger';

        resultBody.innerHTML = `
          <h4 class="mb-3">${data.tipo}</h4>
          <h5><span class="badge badge-${exportableColor} exportable-badge">${exportableIcon}</span></h5>
          <div class="mt-3">
            <p class="mb-1"><strong>Confianza:</strong></p>
            <div class="progress" style="height: 25px;">
              <div class="progress-bar progress-bar-striped bg-${probColor}" style="width: ${data.probabilidad}%">
                ${data.probabilidad}%
              </div>
            </div>
          </div>
        `;
        resultCard.style.display = 'block';
      })
      .catch(err => {
        resultCard.style.display = 'block';
        resultBody.innerHTML = `<div class="alert alert-danger">❌ ${err.message}</div>`;
      })
      .finally(() => {
        loader.style.display = 'none';
        btn.disabled = false;
      });
  }
  </script>
</body>
</html>
